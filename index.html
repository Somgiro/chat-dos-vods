<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Trovo Sync Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Cores Oficiais Trovo */
            --primary: #19d66b; 
            --bg: #060809;
            --topbar: #121517;
            --msg-bg: rgba(25, 214, 107, 0.05);
            --font-main: 'Amatic SC', cursive;
        }

        body {
            background: var(--bg);
            color: #ffffff;
            font-family: var(--font-main);
            font-weight: 700;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Mascote Trovo fixo */
        .mascote-trovo {
            position: fixed;
            top: 15px;
            right: 20px;
            width: 80px;
            z-index: 100;
            pointer-events: none;
            filter: drop-shadow(0 0 10px var(--primary));
        }

        #privacy-notice {
            background: #19d66b;
            padding: 5px;
            text-align: center;
            font-size: 20px;
            color: #000;
            letter-spacing: 2px;
        }

        .top-bar {
            background: var(--topbar);
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid var(--primary);
            z-index: 10;
        }

        .file-label, .btn-popup {
            background: #1f2326;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 22px;
            font-family: var(--font-main);
            transition: 0.3s;
        }

        .file-label:hover, .btn-popup:hover { background: var(--primary); color: #000; }
        input[type="file"] { display: none; }

        .time-control {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-grow: 1;
        }

        #timer-slider {
            flex-grow: 1;
            accent-color: var(--primary);
            cursor: pointer;
        }

        #display-time {
            font-size: 32px;
            min-width: 90px;
            color: var(--primary);
        }

        #chat-flow {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .msg-card {
            background: var(--msg-bg);
            padding: 10px 15px;
            border-radius: 4px;
            border-left: 4px solid var(--primary);
            max-width: 80%;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .sender { color: var(--primary); font-size: 24px; text-transform: uppercase; }
        .text { font-size: 32px; color: #fff; margin: 2px 0; line-height: 1; }
        .msg-time { font-size: 18px; opacity: 0.3; }

        .btn-play {
            background: var(--primary);
            border: none;
            color: #000;
            font-family: var(--font-main);
            font-size: 28px;
            padding: 5px 35px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-play.pausado { background: #ff4d4d; color: #fff; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #060809; }
        ::-webkit-scrollbar-thumb { background: #19d66b; border-radius: 10px; }
    </style>
</head>
<body>

<img src="https://raw.githubusercontent.com/Somgiro/chat-dos-vods/0183148c9b3532967da344748505de780454cae9/assets/image.png" class="mascote-trovo" alt="Trovo Mascot">

<div id="privacy-notice">🛡️ AMBIENTE SEGURO - PROCESSAMENTO LOCAL</div>

<div class="top-bar">
    <label class="file-label">📂 CARREGAR JSON <input type="file" id="jsonInput" accept=".json"></label>
    
    <button id="playBtn" class="btn-play">PLAY SYNC</button>
    <button class="btn-popup" onclick="abrirPopup()">POP-UP</button>

    <div class="time-control">
        <span id="display-time">00:00:00</span>
        <input type="range" id="timer-slider" value="0" min="0" step="1">
    </div>
</div>

<div id="chat-flow">
    <div style="text-align: center; margin-top: 50px; opacity: 0.5; font-size: 35px;">
        PREPARADO PARA O VOD? CARREGUE O CHAT...
    </div>
</div>

<script>
    let messages = [];
    let startTime = 0;
    let isPlaying = false;
    let interval;
    let currentSeconds = 0;

    const jsonInput = document.getElementById('jsonInput');
    const playBtn = document.getElementById('playBtn');
    const slider = document.getElementById('timer-slider');
    const displayTime = document.getElementById('display-time');
    const chatFlow = document.getElementById('chat-flow');

    jsonInput.addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const data = JSON.parse(event.target.result);
                messages = data.messages || [];
                if(messages.length > 0) {
                    startTime = new Date(messages[0].date).getTime();
                    const endTime = new Date(messages[messages.length - 1].date).getTime();
                    slider.max = Math.floor((endTime - startTime) / 1000);
                    chatFlow.innerHTML = '<div style="text-align: center; color: #19d66b; font-size: 35px;">VOD SINCRONIZADO COM SUCESSO!</div>';
                }
            } catch(err) { alert("Erro no JSON."); }
        };
        reader.readAsText(e.target.files[0]);
    });

    function formatTime(s) {
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
    }

    function updateChat() {
        chatFlow.innerHTML = '';
        const virtualTime = startTime + (currentSeconds * 1000);
        const fragment = document.createDocumentFragment();

        messages.forEach(m => {
            const mTime = new Date(m.date).getTime();
            if(mTime <= virtualTime) {
                const card = document.createElement('div');
                card.className = 'msg-card';
                let content = Array.isArray(m.text) ? m.text.map(t => typeof t === 'string' ? t : t.text).join('') : m.text;
                if(!content || content.trim() === "") return;
                card.innerHTML = `<div class="sender">${m.from || 'Sistema'}</div><div class="text">${content}</div><div class="msg-time">${m.date.split('T')[1].substring(0,8)}</div>`;
                fragment.appendChild(card);
            }
        });
        chatFlow.appendChild(fragment);
        chatFlow.scrollTop = chatFlow.scrollHeight;
    }

    playBtn.addEventListener('click', () => {
        isPlaying = !isPlaying;
        playBtn.innerText = isPlaying ? "PAUSE" : "PLAY SYNC";
        playBtn.classList.toggle('pausado', isPlaying);
        if(isPlaying) {
            interval = setInterval(() => {
                currentSeconds++;
                slider.value = currentSeconds;
                displayTime.innerText = formatTime(currentSeconds);
                updateChat();
            }, 1000);
        } else { clearInterval(interval); }
    });

    slider.addEventListener('input', () => {
        currentSeconds = parseInt(slider.value);
        displayTime.innerText = formatTime(currentSeconds);
        updateChat();
    });

    function abrirPopup() {
        const popup = window.open(window.location.href, 'ChatPopUp', 'width=450,height=600,menubar=no,toolbar=no,location=no,status=no');
    }
</script>
</body>
</html>
