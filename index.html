<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Trovo Sync Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5ec98e; 
            --bg: #060809;
            --topbar: #121517;
            --msg-bg: rgba(94, 201, 142, 0.07);
            --font-main: 'Amatic SC', cursive;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg);
            color: #ffffff;
            font-family: var(--font-main);
            font-weight: 700;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            /* TRAVA DE SEGURANÇA GLOBAL: Impede o "sumiço" por esmagamento */
            min-width: 280px; 
        }

        /* CABEÇALHO ADAPTÁVEL */
        .top-bar {
            background: var(--topbar);
            padding: 8px 12px;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            border-bottom: 2px solid var(--primary);
            z-index: 20;
            transition: all 0.3s ease;
        }

        .controls-group {
            display: flex;
            gap: 6px;
            flex-shrink: 0; /* Impede que os botões diminuam de tamanho */
            align-items: center;
        }

        .time-control {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-grow: 1;
            min-width: 150px; /* Garante que o player sempre tenha espaço */
        }

        /* AJUSTE PARA O POP-UP (COMPRESSÃO MÁXIMA) */
        @media screen and (max-width: 480px) {
            .top-bar {
                flex-direction: column; /* Empilha os itens para nada sumir */
                align-items: stretch;
                padding: 10px;
            }
            .controls-group {
                justify-content: space-between;
                width: 100%;
            }
            .time-control {
                width: 100%;
                margin-top: 5px;
            }
            .mascote-trovo {
                width: 40px; /* Reduz o mascote no pop-up para não poluir */
            }
        }

        /* MASCOTE COM PRIORIDADE */
        .mascote-container {
            position: fixed;
            bottom: 15px;
            right: 15px;
            z-index: 100;
            pointer-events: none;
        }

        .mascote-trovo {
            width: 55px;
            opacity: 0.7;
            filter: drop-shadow(0 0 5px var(--primary));
        }

        /* BOTÕES */
        .file-label, .btn-popup, .btn-play {
            background: #1f2326;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 2px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
            font-family: var(--font-main);
            white-space: nowrap;
        }

        .btn-play {
            background: var(--primary);
            color: #000;
            font-weight: bold;
            min-width: 60px;
        }

        #timer-slider {
            flex-grow: 1;
            accent-color: var(--primary);
            cursor: pointer;
        }

        #display-time {
            font-size: 20px;
            color: var(--primary);
            min-width: 65px;
            text-align: right;
        }

        /* CHAT */
        #chat-flow {
            flex-grow: 1;
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg-card {
            background: var(--msg-bg);
            padding: 8px 12px;
            border-left: 3px solid var(--primary);
            max-width: 95%;
            word-wrap: break-word;
        }

        .sender { color: var(--primary); font-size: 20px; }
        .text { font-size: 28px; line-height: 1.1; margin: 2px 0; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); }
    </style>
</head>
<body>

<div class="mascote-container">
    <img src="https://raw.githubusercontent.com/Somgiro/chat-dos-vods/0183148c9b3532967da344748505de780454cae9/assets/image.png" class="mascote-trovo">
</div>

<div class="top-bar">
    <div class="controls-group">
        <label class="file-label" title="Carregar JSON">📂 <input type="file" id="jsonInput" accept=".json"></label>
        <button id="playBtn" class="btn-play">PLAY</button>
        <button class="btn-popup" onclick="abrirPopup()">POP</button>
    </div>

    <div class="time-control">
        <input type="range" id="timer-slider" value="0" min="0" step="1">
        <span id="display-time">00:00:00</span>
    </div>
</div>

<div id="chat-flow">
    <div style="text-align: center; margin-top: 30px; opacity: 0.3; font-size: 28px;">
        START VOD
    </div>
</div>

<script>
    let messages = [];
    let startTime = 0;
    let isPlaying = false;
    let interval;
    let currentSeconds = 0;

    const jsonInput = document.getElementById('jsonInput');
    const playBtn = document.getElementById('playBtn');
    const slider = document.getElementById('timer-slider');
    const displayTime = document.getElementById('display-time');
    const chatFlow = document.getElementById('chat-flow');

    jsonInput.addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const data = JSON.parse(event.target.result);
                messages = data.messages || [];
                if(messages.length > 0) {
                    startTime = new Date(messages[0].date).getTime();
                    const endTime = new Date(messages[messages.length - 1].date).getTime();
                    slider.max = Math.floor((endTime - startTime) / 1000);
                    chatFlow.innerHTML = '';
                }
            } catch(err) { console.error("Erro JSON"); }
        };
        reader.readAsText(e.target.files[0]);
    });

    function formatTime(s) {
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
    }

    function updateChat() {
        chatFlow.innerHTML = '';
        const virtualTime = startTime + (currentSeconds * 1000);
        const fragment = document.createDocumentFragment();

        messages.forEach(m => {
            const mTime = new Date(m.date).getTime();
            if(mTime <= virtualTime) {
                const card = document.createElement('div');
                card.className = 'msg-card';
                let content = Array.isArray(m.text) ? m.text.map(t => typeof t === 'string' ? t : t.text).join('') : m.text;
                if(!content) return;
                card.innerHTML = `<div class="sender">${m.from || 'User'}</div><div class="text">${content}</div>`;
                fragment.appendChild(card);
            }
        });
        chatFlow.appendChild(fragment);
        chatFlow.scrollTop = chatFlow.scrollHeight;
    }

    playBtn.addEventListener('click', () => {
        isPlaying = !isPlaying;
        playBtn.innerText = isPlaying ? "PAUSE" : "PLAY";
        if(isPlaying) {
            interval = setInterval(() => {
                currentSeconds++;
                slider.value = currentSeconds;
                displayTime.innerText = formatTime(currentSeconds);
                updateChat();
            }, 1000);
        } else { clearInterval(interval); }
    });

    slider.addEventListener('input', () => {
        currentSeconds = parseInt(slider.value);
        displayTime.innerText = formatTime(currentSeconds);
        updateChat();
    });

    function abrirPopup() {
        // Sugestão de tamanho ideal para o pop-up
        window.open(window.location.href, 'ChatPopUp', 'width=320,height=550');
    }
</script>
</body>
</html>
