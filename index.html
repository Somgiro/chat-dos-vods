<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TROVADOR - PLAYER</title>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5ec98e; 
            --bg: #060809;
            --topbar: #121517;
            --msg-bg: rgba(255, 255, 255, 0.03);
            --font-main: 'Amatic SC', cursive;
        }
        body {
            background: var(--bg);
            color: #ffffff;
            font-family: var(--font-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        .top-bar {
            background: var(--topbar);
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            border-bottom: 2px solid var(--primary);
        }
        .file-label, .btn-play {
            background: #1f2326;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 5px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 20px;
            font-family: var(--font-main);
        }
        #timer-slider { flex-grow: 1; accent-color: var(--primary); }
        
        /* Estilo do relógio editável */
        #display-time {
            font-size: 22px;
            color: var(--primary);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid transparent;
            width: 90px;
            text-align: center;
            font-family: var(--font-main);
            cursor: text;
            border-radius: 4px;
            transition: all 0.2s;
        }
        #display-time:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(94, 201, 142, 0.1);
        }

        #chat-flow {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .msg-card {
            background: var(--msg-bg);
            padding: 10px 15px;
            border-left: 4px solid transparent;
            max-width: 98%;
        }
        .sender { font-size: 24px; font-weight: bold; margin-bottom: 2px; }
        .text { font-size: 28px; line-height: 1.1; color: #eee; }
    </style>
</head>
<body>

<div class="top-bar">
    <label class="file-label">📂 ABRIR LOG <input type="file" id="jsonInput" style="display:none"></label>
    <button id="playBtn" class="btn-play">PLAY</button>
    <input type="range" id="timer-slider" value="0">
    <input type="text" id="display-time" value="00:00:00">
</div>

<div id="chat-flow"></div>

<script>
    let messages = [];
    let startTime = 0;
    let isPlaying = false;
    let interval;
    let currentSeconds = 0;
    let lastRenderedIndex = -1;
    const userColors = {};

    function getUserColor(username) {
        if (userColors[username]) return userColors[username];
        let hash = 0;
        for (let i = 0; i < username.length; i++) hash = username.charCodeAt(i) + ((hash << 5) - hash);
        const color = `hsl(${Math.abs(hash % 360)}, 70%, 60%)`;
        userColors[username] = color;
        return color;
    }

    document.getElementById('jsonInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const lines = event.target.result.trim().split('\n').filter(l => l.trim());
                messages = lines.map(line => {
                    const m = JSON.parse(line);
                    const [h, min, s] = m.hora.split(':');
                    const d = new Date(); d.setHours(h, min, s, 0);
                    return { date: d.getTime(), text: m.msg, user: m.nick_name || "Sistema" };
                }).sort((a, b) => a.date - b.date);

                startTime = messages[0].date;
                const endTime = messages[messages.length - 1].date;
                document.getElementById('timer-slider').max = Math.floor((endTime - startTime) / 1000);
                resetToTime(0);
            } catch(e) { alert("Erro no JSON!"); }
        };
        reader.readAsText(e.target.files[0]);
    });

    function resetToTime(secs) {
        currentSeconds = secs;
        document.getElementById('timer-slider').value = secs;
        // Formata os segundos de volta para o padrão HH:MM:SS no input
        document.getElementById('display-time').value = new Date(secs * 1000).toISOString().substr(11, 8);
        document.getElementById('chat-flow').innerHTML = '';
        lastRenderedIndex = -1;
        updateChat();
    }

    function updateChat() {
        const virtualTime = startTime + (currentSeconds * 1000);
        for (let i = lastRenderedIndex + 1; i < messages.length; i++) {
            const m = messages[i];
            if (m.date <= virtualTime) {
                if (m.text?.trim()) {
                    const color = getUserColor(m.user);
                    const card = document.createElement('div');
                    card.className = 'msg-card';
                    card.style.borderLeftColor = color;
                    card.innerHTML = `<div class="sender" style="color:${color}">${m.user}</div><div class="text">${m.text}</div>`;
                    document.getElementById('chat-flow').appendChild(card);
                    document.getElementById('chat-flow').scrollTop = document.getElementById('chat-flow').scrollHeight;
                }
                lastRenderedIndex = i;
            } else break;
        }
    }

    document.getElementById('playBtn').addEventListener('click', function() {
        isPlaying = !isPlaying;
        this.innerText = isPlaying ? "PAUSE" : "PLAY";
        if(isPlaying) {
            interval = setInterval(() => {
                currentSeconds++;
                const maxVal = parseInt(document.getElementById('timer-slider').max);
                if (currentSeconds > maxVal) {
                    clearInterval(interval);
                    isPlaying = false;
                    this.innerText = "PLAY";
                    return;
                }
                document.getElementById('timer-slider').value = currentSeconds;
                document.getElementById('display-time').value = new Date(currentSeconds * 1000).toISOString().substr(11, 8);
                updateChat();
            }, 1000);
        } else clearInterval(interval);
    });

    document.getElementById('timer-slider').addEventListener('input', function() {
        resetToTime(parseInt(this.value));
    });

    // NOVA LÓGICA: Sincronizar ao digitar e apertar ENTER
    document.getElementById('display-time').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            const timeParts = this.value.split(':').map(val => parseInt(val) || 0);
            let totalSeconds = 0;

            if (timeParts.length === 3) {
                // Considera HH:MM:SS
                totalSeconds = (timeParts[0] * 3600) + (timeParts[1] * 60) + timeParts[2];
            } else if (timeParts.length === 2) {
                // Considera MM:SS
                totalSeconds = (timeParts[0] * 60) + timeParts[1];
            } else if (timeParts.length === 1) {
                // Considera apenas segundos
                totalSeconds = timeParts[0];
            }

            const maxSecs = parseInt(document.getElementById('timer-slider').max) || 0;
            
            if (!isNaN(totalSeconds) && totalSeconds >= 0) {
                if (totalSeconds > maxSecs) totalSeconds = maxSecs;
                resetToTime(totalSeconds);
                this.blur(); // Remove o foco para confirmar a alteração visual
            } else {
                // Se der erro, volta para o tempo atual do slider
                resetToTime(parseInt(document.getElementById('timer-slider').value));
            }
        }
    });
</script>
</body>
</html>
